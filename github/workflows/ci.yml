name: Project Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-project:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        else
          cd need-you-to-make-a-simple && npm install
        fi

    # الخطوة السحرية: تشغيل السيرفر في الخلفية والانتظار حتى يفتح بورت 3000
    - name: Start Server & Run Smoke Test
      run: |
        # تشغيل المشروع في الخلفية باستخدام & عشان الـ Pipeline ما يقفش مكانه
        if [ -f scripts/start-all.js ]; then
          node scripts/start-all.js &
        elif [ -f need-you-to-make-a-simple/scripts/start-all.js ]; then
          node need-you-to-make-a-simple/scripts/start-all.js &
        else
          npm start &
        fi
        
        # انتظر 5 ثوانٍ كاملة حتى يقوم السيرفر ويفتح البورت بنجاح
        sleep 5
        
        # الآن شغل ملف الفحص والسريرفر مفتوح
        if [ -f scripts/smoke-test.js ]; then
          node scripts/smoke-test.js
        else
          node need-you-to-make-a-simple/scripts/smoke-test.js
        fi